<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Connected</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0fdf4;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            text-align: center;
        }
        .icon {
            width: 64px;
            height: 64px;
            background: #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .icon svg { width: 32px; height: 32px; stroke: white; fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
        h1 { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 12px; }
        p { font-size: 15px; color: #555; line-height: 1.6; margin-bottom: 8px; }
        .email { font-weight: 600; color: #111; }
        .note {
            margin-top: 28px;
            padding: 16px;
            background: #f0fdf4;
            border-radius: 10px;
            font-size: 14px;
            color: #16a34a;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h1>Google Connected!</h1>
        <p>Your Google account has been successfully linked.</p>
        {email_line}
        <div class="note">
            You can now close this window and return to the app. Your assistant is ready to use Gmail on your behalf.
        </div>
    </div>
</body>
</html>
